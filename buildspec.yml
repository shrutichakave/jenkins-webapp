version: 0.2

phases:
  install:
   runtime-versions:
    nodejs: 22
   commands:
    -echo installing source NPM dependencies...
    -npm install
  build:
   commands:
    -echo Build started on 'date'
    -echo Building the Node.js application...
    -npm run build
  post_build:
   commands:
    -echo Build completed on 'date'

artifacts:
  files:
   -'**/*'
  base-directory: 'dist'        